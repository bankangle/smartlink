# Local development: just Postgres. Run the API and web app on the host.
#   docker compose -f infra/docker-compose.dev.yml up -d
services:
  db:
    image: postgres:17-alpine
    container_name: smartlink-db-dev
    environment:
      POSTGRES_DB: smartlink
      POSTGRES_USER: smartlink
      POSTGRES_PASSWORD: smartlink
    ports:
      # Host 5433 to avoid clashing with a locally-installed Postgres on 5432.
      - "5433:5432"
    volumes:
      - smartlink_pg_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartlink"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  smartlink_pg_dev:
